[tox]
envlist = py310,py311,py312,py313
isolated_build = True
skip_missing_interpreters = True
# Use uv for faster package installation
requires = tox-uv

[testenv]
# Let tox-uv handle the environment creation and package installation
runner = uv-venv-runner
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    pytest-mock>=3.10.0
commands =
    pytest {posargs:tests/}

[testenv:coverage]
deps =
    {[testenv]deps}
commands =
    pytest --cov=fedyolo --cov-report=term-missing --cov-report=html --cov-report=xml {posargs:tests/}

[testenv:lint]
deps =
    flake8
    black
    isort
commands =
    flake8 fedyolo tests
    black --check fedyolo tests
    isort --check-only fedyolo tests

[testenv:format]
deps =
    black
    isort
commands =
    black fedyolo tests
    isort fedyolo tests
